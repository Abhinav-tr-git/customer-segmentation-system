project_name: customer_segmentation
version: 1.0.0

data:
  raw_path: data/raw/int_online_tx.csv
  processed_path: data/processed/customer_segments.csv
  cleaned_transactions_path: data/processed/cleaned_transactions.csv

model:
  n_clusters: 5  # Initial guess, can be tuned
  random_state: 42
  pca_components: 3
  model_save_path: models/clustering_model.joblib
  pca_save_path: models/pca_transformer.joblib
  scaler_save_path: models/scaler.joblib

logging:
  level: INFO
  log_file: logs/pipeline.log
